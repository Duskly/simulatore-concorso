<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mio Simulatore Quiz</title>
   <style>
    :root { 
        /* NUOVA PALETTE COLORI DARK (Sostituito il Viola con Ciano) */
        --primary: #cccccc;     /* Blu Ciano brillante e tecnico */
        --success: #1b5e20;     /* Verde scuro per le risposte esatte */
        --error: #b71c1c;       /* Rosso scuro per le risposte errate */
        --bg: #121212;          /* Sfondo pagina nero/grigio molto scuro */
        --card-bg: #1e1e1e;     /* Sfondo del contenitore quiz (card) */
        --text: #e0e0e0;        /* Testo chiaro generale */
        --border: #333;         /* Colore dei bordi dei bottoni */
    }

    body { 
        font-family: sans-serif; 
        background: var(--bg); 
        color: var(--text);
        display: flex; 
        justify-content: center; 
        padding: 20px; 
    }

    .quiz-container { 
        background: var(--card-bg); 
        padding: 2rem; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        max-width: 600px; 
        width: 100%; 
    }

    .header { 
        display: flex; 
        justify-content: space-between; 
        margin-bottom: 20px; 
        font-weight: bold; 
        color: var(--primary); /* Ora usa il Ciano */
        border-bottom: 2px solid #333; 
        padding-bottom: 10px; 
    }

    .question-text { 
        font-size: 1.2rem; 
        margin-bottom: 1.5rem; 
        line-height: 1.4; 
        color: #ffffff; /* Bianco per la domanda per massima leggibilità */
    }

    .options-container { 
        display: flex; 
        flex-direction: column; 
        gap: 10px; 
    }

    .option-btn { 
        padding: 15px; 
        border: 2px solid var(--border); 
        border-radius: 8px; 
        background: #252525; /* Sfondo bottone scuro */
        color: var(--text);
        cursor: pointer; 
        text-align: left; 
        transition: 0.2s; 
        font-size: 1rem; 
    }

    .option-btn:hover:not(:disabled) { 
        border-color: var(--primary); /* Bordo Ciano al passaggio del mouse */
        background: #2d2d2d; 
    }

    .correct { 
        background-color: var(--success) !important; 
        color: white !important; 
        border-color: #4caf50 !important; 
    }

    .wrong { 
        background-color: var(--error) !important; 
        color: white !important; 
        border-color: #f44336 !important; 
    }

    .nav-buttons { 
        display: flex; 
        justify-content: space-between; 
        margin-top: 2rem; 
        gap: 10px; 
    }

    .nav-btn { 
        padding: 12px 20px; 
        border: none; 
        border-radius: 5px; 
        background: var(--primary); /* Sfondo Ciano */
        color: #000000;          /* Testo nero per contrasto sul Ciano */
        cursor: pointer; 
        flex: 1; 
        font-weight: bold; 
    }

    .nav-btn:disabled { 
        opacity: 0.3; 
        cursor: not-allowed; 
    }
</style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <span id="progress">Caricamento...</span>
        <span id="score">Esatte: 0</span>
    </div>

    <div id="quiz-content">
        <p class="question-text" id="question-text">In attesa del file domande.js...</p>
        <div class="options-container" id="options-container"></div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prev-btn" onclick="changeQuestion(-1)">← Precedente</button>
        <button class="nav-btn" id="next-btn" onclick="changeQuestion(1)">Successiva →</button>
    </div>
</div>

<script src="domande.js"></script>

<script>
    let domandeMescolate = [];
    let currentIndex = 0;
    let risposteDate = {}; 
    let punteggio = 0;

    function mescola(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function iniziaQuiz() {
        // Controllo se la variabile esiste nel file domande.js
        if (typeof databaseDomande === 'undefined') {
            document.getElementById('question-text').innerHTML = "<span style='color:red'>Errore: Il file 'domande.js' non è stato trovato o è scritto male. Controlla che sia nella stessa cartella dell'HTML!</span>";
            return;
        }
        domandeMescolate = mescola(databaseDomande);
        render();
    }

    function render() {
        const q = domandeMescolate[currentIndex];
        document.getElementById('progress').innerText = `Domanda ${currentIndex + 1} di ${domandeMescolate.length}`;
        document.getElementById('question-text').innerText = q.text;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Mescoliamo le risposte solo se non è già stata data una risposta
        if (!q._opzioniMescolate) {
            q._opzioniMescolate = mescola(q.answers);
        }

        q._opzioniMescolate.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (risposteDate[currentIndex]) {
                btn.disabled = true;
                if (opt === q.corretta) btn.classList.add('correct');
                if (opt === risposteDate[currentIndex] && opt !== q.corretta) btn.classList.add('wrong');
            } else {
                btn.onclick = () => {
                    risposteDate[currentIndex] = opt;
                    if (opt === q.corretta) {
                        punteggio++;
                        document.getElementById('score').innerText = `Esatte: ${punteggio}`;
                    }
                    render();
                };
            }
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').disabled = currentIndex === domandeMescolate.length - 1;
    }

    function changeQuestion(step) {
        currentIndex += step;
        render();
    }

    // Aspetta un secondo che il file JS venga letto
    window.onload = iniziaQuiz;
</script>
</body>
</html>
